theme: jekyll-theme-minimal
title: 本草拾珍 · Herba Atlas
description: >-
  以约五百味药材与百余首经典方剂为数据基础，
  沿「史 · 方 · 药」叙事呈现本草沿革，
  围绕四气、五味、归经、升降沉浮、功效与配伍构建交互图谱，
  辅以交叉分析、用量安全、词频探查与方剂配伍网络。

# 站点设置
lang: zh-CN
encoding: utf-8

# 导航与链接
show_downloads: false
github:
  repository_url: https://github.com/oceancat91/Herb-Gleanings.github.io
  is_project_page: true

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 排除不被部署的文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
